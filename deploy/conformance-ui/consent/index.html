<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nazo OAuth Conformance Consent</title>
</head>
<body>
<div id="oidf_conformance_interaction">OIDF conformance consent page</div>
<button id="oidf_conformance_deny" type="button">Deny</button>
<script>
(function () {
  var autoApproveTimer = null;
  var submitted = false;

  function queryParam(name) {
    var query = window.location.search.replace(/^\?/, '').split('&');
    for (var i = 0; i < query.length; i++) {
      if (!query[i]) { continue; }
      var pair = query[i].split('=');
      if (decodeURIComponent(pair[0].replace(/\+/g, ' ')) === name) {
        return decodeURIComponent((pair.slice(1).join('=') || '').replace(/\+/g, ' '));
      }
    }
    return null;
  }

  function fail(message) { document.body.textContent = message; }

  function appendHidden(form, name, value) {
    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }

  function submitDecision(decision) {
    if (submitted) { return; }
    submitted = true;
    if (autoApproveTimer !== null) {
      window.clearTimeout(autoApproveTimer);
      autoApproveTimer = null;
    }
    decisionInput.value = decision;
    form.submit();
  }

  var requestId = queryParam('request_id');
  if (!requestId) {
    fail('missing request_id');
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/authorize/consent?request_id=' + encodeURIComponent(requestId), false);
  xhr.withCredentials = true;
  try {
    xhr.send();
  } catch (error) {
    fail('consent request failed: ' + String(error));
    return;
  }
  if (xhr.status < 200 || xhr.status >= 300) {
    fail('consent load failed: ' + xhr.status);
    return;
  }

  var data = JSON.parse(xhr.responseText || '{}');
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = '/authorize/decision';
  appendHidden(form, 'request_id', requestId);
  appendHidden(form, 'csrf_token', data.csrf_token || '');
  var decisionInput = document.createElement('input');
  decisionInput.type = 'hidden';
  decisionInput.name = 'decision';
  decisionInput.value = 'approve';
  form.appendChild(decisionInput);
  document.body.appendChild(form);

  var denyButton = document.getElementById('oidf_conformance_deny');
  denyButton.addEventListener('click', function () { submitDecision('deny'); });
  autoApproveTimer = window.setTimeout(function () { submitDecision('approve'); }, 5000);
}());
</script>
</body>
</html>
