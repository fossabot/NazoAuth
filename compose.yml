name: nazo-oauth

services:
  migrate:
    build:
      context: .
      dockerfile: Containerfile
    container_name: nazo-oauth-migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/oauth
    command: ["nazo-oauth-migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      nazo_oauth_net:

  nazo_oauth_server:
    build:
      context: .
      dockerfile: Containerfile
    container_name: nazo-oauth-server
    environment:
      BIND: 0.0.0.0:8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/oauth
      VALKEY_URL: redis://valkey:6379/0
      ISSUER: ${ISSUER:-http://127.0.0.1:8000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:3000}
      JWK_KEYS_DIR: /var/lib/nazo_oauth/keys
      AVATAR_STORAGE_DIR: /var/lib/nazo_oauth/avatars
      SESSION_TTL_SECONDS: "28800"
      AUTH_CODE_TTL_SECONDS: "300"
      ACCESS_TOKEN_TTL_SECONDS: "300"
      ID_TOKEN_TTL_SECONDS: "600"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
    volumes:
      - ./runtime/keys:/var/lib/nazo_oauth/keys
      - ./runtime/avatars:/var/lib/nazo_oauth/avatars
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    networks:
      nazo_oauth_net:
    ports:
      - "8000:8000"

  postgres:
    image: docker.io/library/postgres:18
    container_name: nazo-oauth-postgres
    environment:
      POSTGRES_DB: oauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oauth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      nazo_oauth_net:
    ports:
      - "5432:5432"

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: nazo-oauth-valkey
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      nazo_oauth_net:
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  valkey_data:

networks:
  nazo_oauth_net:
    driver: bridge
